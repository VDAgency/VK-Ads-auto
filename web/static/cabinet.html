<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Личный кабинет — VK-Ads-auto</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar"><div class="brand">VK<span>·</span>Ads<span>·</span>auto</div></header>

    <main class="wrap">
      <div class="eyebrow">Личный кабинет</div>

      <!-- Просмотр кабинета -->
      <section id="view" hidden>
        <h2 id="greeting">Здравствуйте!</h2>
        <p class="lead">Статус ваших брифов. Расход не показываем — только результат.</p>

        <div class="card" id="profile" style="margin-bottom: 16px"></div>

        <div class="section-title">Ваши брифы</div>
        <div id="briefs"></div>

        <div class="card" id="referral" style="margin-top: 16px"></div>

        <p style="margin-top: 20px">
          <a href="#" id="logout">Выйти</a>
        </p>
      </section>

      <!-- Первый вход: установка пароля -->
      <section id="setpw" hidden style="max-width: 440px">
        <h2>Задайте пароль для входа</h2>
        <p class="lead">
          Придумайте пароль — по нему вы будете входить в кабинет.
          <strong>Запишите или запомните его.</strong> Минимум 8 символов.
        </p>
        <div class="form-field">
          <label for="pw1">Пароль</label>
          <input id="pw1" type="password" autocomplete="new-password" />
        </div>
        <div class="form-field">
          <label for="pw2">Повторите пароль</label>
          <input id="pw2" type="password" autocomplete="new-password" />
        </div>
        <div class="result err" id="setpw-error" hidden></div>
        <button id="setpw-btn" class="btn btn--primary" type="button">
          Сохранить пароль и войти
        </button>
      </section>

      <div class="result err" id="error" hidden></div>
    </main>

    <script>
      const STATUS_RU = {
        received: "Принят",
        parsed: "В работе",
        prepared: "Готов к запуску",
        launched: "Запущена",
      };
      const VARIANT_RU = { individual: "Физлицо", community: "Бизнес (ИП/ООО)" };

      const $ = (id) => document.getElementById(id);
      const show = (id) => $(id).removeAttribute("hidden");
      const hide = (id) => $(id).setAttribute("hidden", "");

      function showError(id, msg) {
        const el = $(id);
        el.textContent = msg;
        el.removeAttribute("hidden");
      }

      function currentToken() {
        return new URLSearchParams(location.search).get("token");
      }

      function esc(s) {
        return String(s == null ? "" : s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]
        );
      }

      // Вход — через модалку на главной. Сюда неавторизованных отправляем на неё.
      function redirectToLogin() {
        location.href = "/?login=1";
      }

      function renderCabinet(data) {
        $("greeting").textContent = data.full_name
          ? "Здравствуйте, " + data.full_name + "!"
          : "Здравствуйте!";

        const contacts = [];
        if (data.email) contacts.push("Email: " + esc(data.email));
        if (data.phone) contacts.push("Телефон: " + esc(data.phone));
        if (data.telegram) contacts.push("Telegram: " + esc(data.telegram));
        $("profile").innerHTML =
          "<h3>Профиль</h3>" +
          (contacts.length ? "<p>" + contacts.join("<br>") + "</p>" : "<p class='note'>—</p>");

        const box = $("briefs");
        if (!data.briefs || !data.briefs.length) {
          box.innerHTML = '<p class="note">Брифов пока нет.</p>';
        } else {
          box.innerHTML = data.briefs
            .map(
              (b) =>
                '<div class="card" style="margin-bottom:12px"><h3>Бриф №' +
                b.id +
                " · " +
                esc(VARIANT_RU[b.variant] || b.variant) +
                "</h3><p>Статус: " +
                esc(STATUS_RU[b.status] || b.status) +
                "</p></div>"
            )
            .join("");
        }

        if (data.referral_url) {
          $("referral").innerHTML =
            "<h3>Пригласите клиента — получите скидку</h3>" +
            "<p class='note'>Ваша реферальная ссылка:</p>" +
            '<p><a href="' +
            esc(data.referral_url) +
            '">' +
            esc(data.referral_url) +
            "</a></p>";
        } else {
          hide("referral");
        }

        hide("setpw");
        show("view");
      }

      async function loadCabinet() {
        // По session-cookie (без токена в URL).
        const resp = await fetch("/api/v1/cabinet", { credentials: "same-origin" });
        if (resp.ok) {
          renderCabinet(await resp.json());
          return true;
        }
        return false;
      }

      async function setPassword() {
        const pw1 = $("pw1").value;
        const pw2 = $("pw2").value;
        hide("setpw-error");
        if (pw1.length < 8) {
          showError("setpw-error", "Пароль должен быть не короче 8 символов.");
          return;
        }
        if (pw1 !== pw2) {
          showError("setpw-error", "Пароли не совпадают.");
          return;
        }
        const resp = await fetch("/api/v1/cabinet/set-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ token: currentToken(), password: pw1 }),
        });
        if (resp.ok) {
          // Пароль установлен, cookie-сессия выдана — открываем кабинет.
          if (!(await loadCabinet())) {
            showError("error", "Пароль сохранён. Обновите страницу для входа.");
          }
        } else if (resp.status === 401) {
          showError("setpw-error", "Ссылка недействительна или истекла. Запросите новую.");
        } else {
          showError("setpw-error", "Не удалось сохранить пароль. Попробуйте позже.");
        }
      }

      async function logout() {
        await fetch("/api/v1/cabinet/logout", { method: "POST", credentials: "same-origin" });
        location.href = "/";
      }

      async function init() {
        $("setpw-btn").addEventListener("click", setPassword);
        $("logout").addEventListener("click", (e) => {
          e.preventDefault();
          logout();
        });

        const token = currentToken();
        if (token) {
          const resp = await fetch("/api/v1/cabinet?token=" + encodeURIComponent(token), {
            credentials: "same-origin",
          });
          if (resp.ok) {
            const data = await resp.json();
            if (!data.password_set) {
              hide("view");
              show("setpw"); // первый вход — обязательная установка пароля
            } else {
              renderCabinet(data);
            }
          } else {
            redirectToLogin(); // токен недействителен/истёк — на модалку входа
          }
        } else if (!(await loadCabinet())) {
          redirectToLogin(); // нет cookie — вход через модалку на главной
        }
      }

      init();
    </script>
  </body>
</html>
