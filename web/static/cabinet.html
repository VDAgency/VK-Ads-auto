<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Кабинет клиента — VK-Ads-auto</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar"><div class="brand">VK<span>·</span>Ads<span>·</span>auto</div></header>

    <main class="wrap">
      <div class="eyebrow">Личный кабинет</div>
      <h2 id="greeting">Загрузка…</h2>
      <p class="lead">Статус ваших брифов. Расход не показываем — только результат.</p>

      <div id="briefs"></div>
      <div class="result err" id="error" style="display: none"></div>
    </main>

    <script>
      const STATUS_RU = { received: "Принят", parsed: "В работе", launched: "Запущена" };
      const VARIANT_RU = { individual: "Физлицо", community: "Бизнес (ИП/ООО)" };

      async function load() {
        const token = new URLSearchParams(location.search).get("token");
        const error = document.getElementById("error");
        if (!token) {
          error.style.display = "block";
          error.textContent = "Нет токена. Откройте кабинет по ссылке из письма/сообщения.";
          return;
        }
        const resp = await fetch("/api/v1/cabinet?token=" + encodeURIComponent(token));
        if (!resp.ok) {
          error.style.display = "block";
          error.textContent = "Ссылка недействительна или истекла. Запросите новую.";
          document.getElementById("greeting").textContent = "Доступ закрыт";
          return;
        }
        const data = await resp.json();
        document.getElementById("greeting").textContent =
          data.full_name ? "Здравствуйте, " + data.full_name + "!" : "Здравствуйте!";
        const box = document.getElementById("briefs");
        if (!data.briefs.length) {
          box.innerHTML = '<p class="note">Брифов пока нет.</p>';
          return;
        }
        box.innerHTML = data.briefs
          .map(
            (b) =>
              '<div class="card" style="margin-bottom:12px"><h3>Бриф №' +
              b.id +
              " · " +
              (VARIANT_RU[b.variant] || b.variant) +
              '</h3><p>Статус: ' +
              (STATUS_RU[b.status] || b.status) +
              "</p></div>"
          )
          .join("");
      }
      load();
    </script>
  </body>
</html>
