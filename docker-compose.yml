# Скелет стека VK-Ads-auto. Секреты — только через переменные окружения (${...})
# из серверного .env; в этот файл и в git значения не попадают.
# Это каркас Фазы 0: образы поднимаются, сервис bot стартует на Фазе 3.

services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      # Загруженные креативы (persistent). Каталог из CREATIVES_DIR (по умолч. /data/creatives).
      - creatives:/data/creatives
    depends_on:
      - postgres
      - redis
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "bot.main"]
    env_file:
      - path: .env
        required: false
    environment:
      # Бот ходит за данными во внутренний API ядра (сервис `api` в этой сети).
      CORE_BASE_URL: http://api:8000
    depends_on:
      - api
      - redis
      - userbot

  # Сервис доставки в Telegram (Telethon). Порт наружу не публикуется — только
  # внутри compose-сети (ядро ходит по http://userbot:8001). Сессия — в ./secrets.
  userbot:
    build:
      context: .
      dockerfile: Dockerfile.userbot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./secrets:/secrets
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  n8n_data:
  caddy_data:
  caddy_config:
  creatives:
