name: CI

# quality — гейт качества (на всех ветках/PR).
# deploy — автодеплой на сервер ТОЛЬКО при push в main и только после зелёного quality
#          (см. docs/DEPLOY.md). Секреты — в GitHub Actions Secrets, не в коде.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy over SSH and verify health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/vk-ads-auto
            git pull --ff-only
            docker compose up -d --build api postgres redis caddy bot userbot
            # Caddy не пересоздаётся при изменении только примонтированного Caddyfile
            # (bind-mount), а hot-reload в этом окружении не всегда применяется —
            # поэтому перезапускаем caddy детерминированно (кратковременный блип).
            docker compose restart caddy
            # Применяем миграции БД (с ретраями до готовности postgres).
            for i in $(seq 1 10); do
              if docker compose exec -T api uv run alembic upgrade head; then echo "migrations OK"; break; fi
              echo "waiting for db... ($i)"; sleep 3
              if [ "$i" = "10" ]; then echo "migrations FAILED"; docker compose logs --tail=80 postgres; exit 1; fi
            done
            for i in $(seq 1 15); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)
              if [ "$code" = "200" ]; then echo "health OK"; exit 0; fi
              sleep 3
            done
            echo "health check FAILED"; docker compose logs --tail=80 api; exit 1
